<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TETOS — SS API Diagnostik v2</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; }
  h1 { color: #333; }
  .box { background: #f5f5f7; padding: 16px; border-radius: 8px; margin: 12px 0; }
  input, button { font-size: 14px; padding: 8px; margin: 4px; }
  button { background: #0066cc; color: white; border: none; border-radius: 6px; cursor: pointer; }
  button:hover { background: #0052a3; }
  pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 6px; overflow: auto; max-height: 400px; font-size: 11px; white-space: pre-wrap; word-break: break-word; }
  .ok { color: green; } .err { color: red; } .info { color: #666; }
  .stat { display: inline-block; padding: 4px 10px; background: #e3f2fd; border-radius: 12px; margin: 2px; font-size: 12px; }
  .warn-box { background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px; margin: 12px 0; border-radius: 4px; }
</style>
</head>
<body>

<h1>🔬 Stanley Stella API — Diagnostik v2</h1>

<div class="warn-box">
  <strong>VIGTIGT:</strong> Upload denne fil til repo-roden og kør den fra Netlify-domænet (ikke lokalt fra Mac), ellers blokerer CORS. Åbn fra:<br><br>
  <strong>https://aquamarine-liger-acf01f.netlify.app/ss-diagnostik.html</strong>
</div>

<div class="box">
  <strong>Login</strong><br>
  <input type="text" id="user" placeholder="Brugernavn / email" style="width:300px">
  <input type="password" id="pass" placeholder="Kodeord" style="width:200px">
  <button onclick="diagnose()">Kør diagnostik →</button>
</div>

<div id="output"></div>

<script>
const log = (msg, cls='') => {
  const div = document.createElement('div');
  div.className = 'box';
  div.innerHTML = `<span class="${cls}">${msg}</span>`;
  document.getElementById('output').appendChild(div);
};
const escapeHtml = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const dump = (label, data, max=3000) => {
  const div = document.createElement('div');
  div.className = 'box';
  const json = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  div.innerHTML = `<strong>${label}</strong><pre>${escapeHtml(json.slice(0, max))}${json.length > max ? '\n\n... (' + (json.length - max) + ' tegn mere)' : ''}</pre>`;
  document.getElementById('output').appendChild(div);
};

async function callSS(endpoint, payload) {
  const url = `https://api.stanleystella.com/webrequest/${endpoint}`;
  const res = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  const status = res.status;
  const rawText = await res.text();
  let parsed = null, parseError = null;
  try { parsed = JSON.parse(rawText); }
  catch (e) { parseError = e.message; }
  return { status, rawText, parsed, parseError };
}

async function diagnose() {
  document.getElementById('output').innerHTML = '';
  const user = document.getElementById('user').value.trim();
  const pass = document.getElementById('pass').value.trim();
  if (!user || !pass) return log('Mangler login', 'err');

  const payload = { LoginName: user, Password: pass, LanguageCode: 'en', PageNum: 1, PageSize: 50000 };

  try {
    log('🔄 Kører diagnostik...', 'info');

    log('📥 Test 1: get_json_color (smoke test)...', 'info');
    const colorRes = await callSS('color/get_json', payload);
    log(`HTTP status: ${colorRes.status}`);
    if (colorRes.parseError) {
      log(`<strong class="err">JSON parse fejl: ${colorRes.parseError}</strong>`, 'err');
      dump('Rå serversvar:', colorRes.rawText);
      return;
    }
    log(`<span class="ok">✓ Forbindelse OK</span>`, 'ok');

    log('📥 Test 2: get_prices...', 'info');
    const priceRes = await callSS('products/get_prices', payload);
    if (priceRes.parseError) {
      dump('❌ Pris-response (kunne ikke parses):', priceRes.rawText);
      return;
    }
    if (!priceRes.parsed?.result) {
      dump('❌ Pris-response har intet result-felt:', priceRes.parsed);
      return;
    }

    const priceRaw = typeof priceRes.parsed.result === 'string'
      ? JSON.parse(priceRes.parsed.result)
      : priceRes.parsed.result;

    if (!Array.isArray(priceRaw)) {
      dump('❌ Priser er ikke array:', priceRaw);
      return;
    }

    log(`<span class="ok">✓ ${priceRaw.length.toLocaleString()} pris-records hentet</span>`, 'ok');
    if (priceRaw.length === 0) return log('<strong class="err">⚠️ 0 records — tjek login</strong>', 'err');

    dump('🔍 Pris-record (første) — alle felter:', priceRaw[0]);

    const skuFields = ['B2BSKUREF', 'SKU', 'sku', 'StyleCode', 'style_code'];
    const detectedSkuField = skuFields.find(f => priceRaw[0][f] !== undefined);
    const priceFields = ['PurchasePrice', 'purchase_price', 'Price', 'price'];
    const detectedPriceField = priceFields.find(f => priceRaw[0][f] !== undefined);
    log(`<span class="info">SKU-felt: <strong>${detectedSkuField || '?'}</strong> · Pris-felt: <strong>${detectedPriceField || '?'}</strong></span>`);

    if (!detectedSkuField || !detectedPriceField) {
      dump('Alle felter:', Object.keys(priceRaw[0]));
      return;
    }

    const skus = priceRaw.map(p => p[detectedSkuField]).filter(Boolean);
    const uniqueSkus = new Set(skus).size;

    const skusByPrefix = {};
    skus.forEach(sku => {
      const prefix = String(sku).slice(0, 7);
      if (!skusByPrefix[prefix]) skusByPrefix[prefix] = [];
      skusByPrefix[prefix].push(sku);
    });
    const uniquePrefixes = Object.keys(skusByPrefix).length;
    const avgVariantsPerStyle = uniqueSkus / uniquePrefixes;

    log(`<strong>📊 SKU-analyse:</strong>
      <div class="stat">${uniqueSkus.toLocaleString()} unikke SKU'er</div>
      <div class="stat">${uniquePrefixes.toLocaleString()} unikke prefix</div>
      <div class="stat">⌀ ${avgVariantsPerStyle.toFixed(1)} varianter pr. prefix</div>`);

    if (avgVariantsPerStyle > 1.5) {
      log('<strong class="ok">✅ FUND: Priser er på VARIANT-niveau!</strong>', 'ok');
    } else {
      log('<strong class="err">⚠️ Priser ser ud til at være på STYLE-niveau</strong>', 'err');
    }

    const samplePrefix = Object.entries(skusByPrefix).find(([p, s]) => s.length > 5)?.[0];
    if (samplePrefix) {
      const skusForStyle = skusByPrefix[samplePrefix];
      const pricesForStyle = priceRaw
        .filter(p => skusForStyle.includes(p[detectedSkuField]))
        .map(p => ({ sku: p[detectedSkuField], price: parseFloat(p[detectedPriceField] || 0) }))
        .filter(x => x.price > 0)
        .sort((a, b) => a.price - b.price);

      const minP = pricesForStyle[0]?.price;
      const maxP = pricesForStyle[pricesForStyle.length - 1]?.price;
      const diffPct = minP ? ((maxP - minP) / minP * 100) : 0;

      log(`<strong>🎯 Pris-spænd "${samplePrefix}":</strong>
        <div class="stat">${pricesForStyle.length} varianter</div>
        <div class="stat">Min: ${minP?.toFixed(2)}</div>
        <div class="stat">Max: ${maxP?.toFixed(2)}</div>
        <div class="stat">Spænd: ${diffPct.toFixed(1)}%</div>`);
      dump(`Top 8 varianter for ${samplePrefix}:`, pricesForStyle.slice(0, 8));
    }

    log('📥 Test 3: get_json (variants — første 5)...', 'info');
    const varRes = await callSS('products/get_json', {...payload, PageSize: 5, In_Stock: false});
    if (!varRes.parseError && varRes.parsed?.result) {
      const varRaw = typeof varRes.parsed.result === 'string'
        ? JSON.parse(varRes.parsed.result)
        : varRes.parsed.result;
      if (Array.isArray(varRaw) && varRaw.length > 0) {
        dump('Variant-record (første) — alle felter:', varRaw[0]);
        log(`<span class="info">Variant-felter: ${Object.keys(varRaw[0]).join(', ')}</span>`);
      }
    } else {
      log(`<span class="err">Variant-endpoint fejlede: ${varRes.parseError || varRes.status}</span>`, 'err');
    }

    log('<strong class="ok">✅ Diagnostik færdig — send screenshot</strong>', 'ok');

  } catch (err) {
    log(`<strong class="err">❌ Fejl: ${err.message}</strong>`, 'err');
    dump('Stack:', err.stack || '');
    console.error(err);
  }
}
</script>
</body>
</html>
