<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TETOS — SS API Diagnostik</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; }
  h1 { color: #333; }
  .box { background: #f5f5f7; padding: 16px; border-radius: 8px; margin: 12px 0; }
  input, button { font-size: 14px; padding: 8px; margin: 4px; }
  button { background: #0066cc; color: white; border: none; border-radius: 6px; cursor: pointer; }
  button:hover { background: #0052a3; }
  pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 6px; overflow: auto; max-height: 400px; font-size: 11px; }
  .ok { color: green; } .err { color: red; } .info { color: #666; }
  .stat { display: inline-block; padding: 4px 10px; background: #e3f2fd; border-radius: 12px; margin: 2px; font-size: 12px; }
</style>
</head>
<body>

<h1>🔬 Stanley Stella API — Diagnostik</h1>
<p>Henter en snapshot fra SS API'et så vi kan designe variant-pris-modellen korrekt.</p>

<div class="box">
  <strong>Login</strong><br>
  <input type="text" id="user" placeholder="Brugernavn / email" style="width:300px">
  <input type="password" id="pass" placeholder="Kodeord" style="width:200px">
  <button onclick="diagnose()">Kør diagnostik →</button>
</div>

<div id="output"></div>

<script>
const log = (msg, cls='') => {
  const div = document.createElement('div');
  div.className = 'box';
  div.innerHTML = `<span class="${cls}">${msg}</span>`;
  document.getElementById('output').appendChild(div);
};
const dump = (label, data, max=2000) => {
  const div = document.createElement('div');
  div.className = 'box';
  const json = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  div.innerHTML = `<strong>${label}</strong><pre>${json.slice(0, max)}${json.length > max ? '\n\n... (' + (json.length - max) + ' tegn mere)' : ''}</pre>`;
  document.getElementById('output').appendChild(div);
};

async function diagnose() {
  document.getElementById('output').innerHTML = '';
  const user = document.getElementById('user').value.trim();
  const pass = document.getElementById('pass').value.trim();
  if (!user || !pass) return log('Mangler login', 'err');

  const payload = { LoginName: user, Password: pass, LanguageCode: 'en', PageNum: 1, PageSize: 50000 };

  try {
    log('🔄 Kører diagnostik... det tager 30-60 sekunder', 'info');

    // 1. Priser
    log('📥 Henter priser (get_prices)...', 'info');
    const priceRes = await fetch('https://api.stanleystella.com/webrequest/products/get_prices', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
    });
    const priceData = await priceRes.json();
    const priceRaw = typeof priceData.result==='string' ? JSON.parse(priceData.result) : priceData.result;

    if (!Array.isArray(priceRaw)) {
      dump('❌ Pris-response (ikke array)', priceData);
      return;
    }

    log(`<span class="ok">✓ ${priceRaw.length.toLocaleString()} pris-records</span>`, 'ok');

    // Tjek struktur af første pris-record
    dump('Pris-record (første) — felter:', priceRaw[0]);

    // Tjek om priserne er pr. style eller pr. variant
    const skus = priceRaw.map(p => p.B2BSKUREF || p.SKU || p.sku).filter(Boolean);
    const uniqueSkus = new Set(skus).size;

    // Tæl unikke priser pr. SKU-prefix (style)
    const skusByPrefix = {};
    skus.forEach(sku => {
      const prefix = sku.split('-')[0]; // ofte "STTU755-C001-S" → STTU755
      if (!skusByPrefix[prefix]) skusByPrefix[prefix] = new Set();
      skusByPrefix[prefix].add(sku);
    });
    const uniquePrefixes = Object.keys(skusByPrefix).length;
    const avgVariantsPerStyle = uniqueSkus / uniquePrefixes;

    log(`<strong>SKU-analyse:</strong>
      <div class="stat">${uniqueSkus.toLocaleString()} unikke SKU'er</div>
      <div class="stat">${uniquePrefixes.toLocaleString()} unikke prefix (sandsynligvis styles)</div>
      <div class="stat">⌀ ${avgVariantsPerStyle.toFixed(1)} varianter pr. style</div>`);

    if (avgVariantsPerStyle > 1.5) {
      log('<strong class="ok">✅ FUND: Priser er på VARIANT-niveau, ikke style-niveau!</strong> Det betyder vi kan hente korrekt pris pr. (farve, størrelse).', 'ok');
    } else {
      log('<strong class="err">⚠️ Priser ser ud til at være på STYLE-niveau.</strong> Variant-pris kræver muligvis andet endpoint.', 'err');
    }

    // Find pris-spænd indenfor en enkelt style
    const samplePrefix = Object.entries(skusByPrefix).find(([p, s]) => s.size > 5)?.[0];
    if (samplePrefix) {
      const skusForStyle = [...skusByPrefix[samplePrefix]];
      const pricesForStyle = priceRaw
        .filter(p => skusForStyle.includes(p.B2BSKUREF || p.SKU || p.sku))
        .map(p => ({
          sku: p.B2BSKUREF || p.SKU || p.sku,
          price: parseFloat(p.PurchasePrice || p.purchase_price || p.Price || p.price || 0)
        }))
        .filter(x => x.price > 0)
        .sort((a, b) => a.price - b.price);

      const minP = pricesForStyle[0]?.price;
      const maxP = pricesForStyle[pricesForStyle.length - 1]?.price;
      const diffPct = minP ? ((maxP - minP) / minP * 100) : 0;

      log(`<strong>Eksempel — style "${samplePrefix}":</strong>
        <div class="stat">${pricesForStyle.length} varianter med pris</div>
        <div class="stat">Min: €${minP?.toFixed(2)}</div>
        <div class="stat">Max: €${maxP?.toFixed(2)}</div>
        <div class="stat">Spænd: ${diffPct.toFixed(1)}%</div>`);

      if (diffPct > 5) {
        log('<strong class="ok">📊 Konkret bevis: Forskellige varianter af samme style HAR forskellige priser.</strong> Variant-pris-fix vil flytte tal.', 'ok');
        dump(`Pris-spænd for ${samplePrefix} (top 8):`, pricesForStyle.slice(0, 8));
      }
    }

    // 2. Varianter (struktur)
    log('📥 Henter variant-struktur (get_json — første 5)...', 'info');
    const varRes = await fetch('https://api.stanleystella.com/webrequest/products/get_json', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({...payload, PageSize: 5, In_Stock: false})
    });
    const varData = await varRes.json();
    const varRaw = typeof varData.result==='string' ? JSON.parse(varData.result) : varData.result;
    if (Array.isArray(varRaw) && varRaw.length > 0) {
      dump('Variant-record (første) — felter:', varRaw[0]);
      log(`<span class="info">Variant-felter: ${Object.keys(varRaw[0]).join(', ')}</span>`);
    }

    log('<strong class="ok">✅ Diagnostik færdig. Send hele dette skærmbillede tilbage.</strong>', 'ok');

  } catch (err) {
    log(`<strong class="err">❌ Fejl: ${err.message}</strong>`, 'err');
    console.error(err);
  }
}
</script>

</body>
</html>
