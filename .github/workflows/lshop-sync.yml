name: L-shop Stock Sync

# Kører 4× dagligt (CET): 06:00, 12:00, 18:00, 00:00
# Cron er i UTC: 5, 11, 17, 23
on:
  schedule:
    - cron: '0 5,11,17,23 * * *'
  workflow_dispatch:        # Manuel trigger via GitHub UI

jobs:
  sync-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install basic-ftp @supabase/supabase-js

      - name: Sync L-shop stock from FTP to Supabase
        env:
          LSHOP_FTP_HOST: ${{ secrets.LSHOP_FTP_HOST }}
          LSHOP_FTP_USER: ${{ secrets.LSHOP_FTP_USER }}
          LSHOP_FTP_PASS: ${{ secrets.LSHOP_FTP_PASS }}
          LSHOP_FTP_PORT: ${{ secrets.LSHOP_FTP_PORT }}
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cat > sync-stock.js << 'SCRIPT_EOF'
          const ftp = require('basic-ftp');
          const { createClient } = require('@supabase/supabase-js');
          const fs = require('fs');

          const log = (msg) => console.log(`[${new Date().toISOString()}] ${msg}`);

          // ── Rens URL og key for almindelige copy-paste-fejl ─────────────
          function cleanEnv(name) {
            let val = process.env[name] || '';
            val = val.trim();                    // whitespace, newlines
            val = val.replace(/^["']|["']$/g, ''); // omsluttende quotes
            val = val.replace(/\/+$/, '');       // trailing slashes
            return val;
          }

          const SUPABASE_URL = cleanEnv('SUPABASE_URL');
          const SUPABASE_KEY = cleanEnv('SUPABASE_KEY');

          // ── Pre-flight validering ───────────────────────────────────────
          if (!SUPABASE_URL) throw new Error('SUPABASE_URL secret is empty or missing');
          if (!SUPABASE_KEY) throw new Error('SUPABASE_KEY secret is empty or missing');
          if (!SUPABASE_URL.startsWith('https://')) {
            throw new Error(`SUPABASE_URL must start with https:// — got: ${SUPABASE_URL.substring(0, 20)}...`);
          }
          if (!SUPABASE_URL.includes('.supabase.co')) {
            throw new Error(`SUPABASE_URL doesn't look right — got: ${SUPABASE_URL.substring(0, 30)}...`);
          }

          log(`🔗 Supabase URL: ${SUPABASE_URL.substring(0, 35)}... (length: ${SUPABASE_URL.length})`);
          log(`🔑 Supabase key: ${SUPABASE_KEY.substring(0, 10)}... (length: ${SUPABASE_KEY.length})`);

          const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

          // ── FTP download ────────────────────────────────────────────────
          async function downloadFromFTP() {
            const client = new ftp.Client(30000);
            client.ftp.verbose = false;
            try {
              log('📡 Connecting to L-shop FTP...');
              await client.access({
                host:     process.env.LSHOP_FTP_HOST,
                user:     process.env.LSHOP_FTP_USER,
                password: process.env.LSHOP_FTP_PASS,
                port:     parseInt(process.env.LSHOP_FTP_PORT || '21'),
                secure:   false
              });
              log('✅ Connected. Listing files...');

              const files = await client.list();
              log(`Found ${files.length} files: ${files.map(f => f.name).join(', ')}`);

              log('📥 Downloading stockfile.csv...');
              await client.downloadTo('stockfile.csv', 'stockfile.csv');

              const stats = fs.statSync('stockfile.csv');
              log(`✅ Downloaded ${(stats.size / 1024 / 1024).toFixed(2)} MB`);
            } finally {
              client.close();
            }
          }

          // ── Parse CSV med BOM-stripping ────────────────────────────────
          function parseCSV(filepath, syncTime) {
            let content = fs.readFileSync(filepath, 'utf8');
            if (content.charCodeAt(0) === 0xFEFF) {
              content = content.slice(1);
              log('🔧 Stripped UTF-8 BOM from CSV');
            }

            const lines = content.split(/\r?\n/).filter(l => l.trim().length > 0);
            if (lines.length < 2) throw new Error('CSV is empty or has only header');

            const headers = lines[0].split(';').map(h => h.trim().toLowerCase());
            log(`📋 CSV headers: ${headers.join(', ')}`);

            const idxArticle = headers.indexOf('article');
            const idxStock   = headers.indexOf('stock');
            const idxCatalog = headers.indexOf('catalog');

            if (idxArticle < 0 || idxStock < 0 || idxCatalog < 0) {
              throw new Error(`Missing expected columns. Found: ${headers.join(', ')}`);
            }

            const rows = [];
            let dropped = 0;

            for (let i = 1; i < lines.length; i++) {
              const vals = lines[i].split(';');
              const article = (vals[idxArticle] || '').trim();
              const stock   = parseInt((vals[idxStock] || '0').trim(), 10);
              const catalog = (vals[idxCatalog] || '').trim();

              if (!article || !catalog || isNaN(stock)) {
                dropped++;
                continue;
              }

              rows.push({
                article_number: article,
                catalog_nr:     catalog,
                stock_qty:      stock,
                last_updated:   syncTime
              });
            }

            log(`✅ Parsed ${rows.length} valid rows (${dropped} dropped)`);
            return rows;
          }

          // ── Pre-flight test mod Supabase ────────────────────────────────
          async function preflightCheck() {
            log('🔍 Pre-flight: testing Supabase connection...');
            const { count, error } = await supabase
              .from('lshop_stock')
              .select('*', { count: 'exact', head: true });
            if (error) {
              throw new Error(`Pre-flight failed — Supabase says: ${error.message}`);
            }
            log(`✅ Supabase OK. Current row count: ${count ?? 0}`);
          }

          // ── Upsert til Supabase ────────────────────────────────────────
          async function uploadToSupabase(rows) {
            const batchSize = 1000;
            let inserted = 0;

            for (let i = 0; i < rows.length; i += batchSize) {
              const batch = rows.slice(i, i + batchSize);
              const { error } = await supabase
                .from('lshop_stock')
                .upsert(batch, { onConflict: 'article_number' });

              if (error) {
                throw new Error(`Batch ${i}-${i + batch.length} failed: ${error.message}`);
              }
              inserted += batch.length;
              if (i % 20000 === 0 && i > 0) {
                log(`   ${inserted}/${rows.length} (${Math.round(inserted/rows.length*100)}%)`);
              }
            }

            log(`🎉 Upserted ${inserted} rows`);
            return inserted;
          }

          // ── Slet stale rækker (dem der ikke var med i denne sync) ──────
          async function cleanupStaleRows(syncTime) {
            log('🗑️  Removing stale rows (not in current FTP file)...');
            const { error, count } = await supabase
              .from('lshop_stock')
              .delete({ count: 'exact' })
              .lt('last_updated', syncTime);
            if (error) {
              log(`⚠️  Cleanup warning: ${error.message}`);
            } else {
              log(`✅ Removed ${count ?? 0} stale rows`);
            }
          }

          // ── Main ───────────────────────────────────────────────────────
          (async () => {
            try {
              log('🚀 Starting L-shop stock sync');
              await preflightCheck();

              const syncTime = new Date().toISOString();
              await downloadFromFTP();
              const rows = parseCSV('stockfile.csv', syncTime);

              const count = await uploadToSupabase(rows);
              await cleanupStaleRows(syncTime);

              log(`✨ DONE — ${count} rows synced at ${syncTime}`);
            } catch (err) {
              console.error(`💥 SYNC FAILED: ${err.message}`);
              if (err.stack) console.error(err.stack);
              process.exit(1);
            }
          })();
          SCRIPT_EOF

          node sync-stock.js
