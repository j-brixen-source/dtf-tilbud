name: L-shop Stock Sync

# Kører 4× dagligt (CET): 06:00, 12:00, 18:00, 00:00
# Cron er i UTC: 5, 11, 17, 23
on:
  schedule:
    - cron: '0 5,11,17,23 * * *'
  workflow_dispatch:        # Manuel trigger via GitHub UI

jobs:
  sync-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install basic-ftp @supabase/supabase-js

      - name: Sync L-shop stock from FTP to Supabase
        env:
          LSHOP_FTP_HOST: ${{ secrets.LSHOP_FTP_HOST }}
          LSHOP_FTP_USER: ${{ secrets.LSHOP_FTP_USER }}
          LSHOP_FTP_PASS: ${{ secrets.LSHOP_FTP_PASS }}
          LSHOP_FTP_PORT: ${{ secrets.LSHOP_FTP_PORT }}
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cat > sync-stock.js << 'SCRIPT_EOF'
          const ftp = require('basic-ftp');
          const { createClient } = require('@supabase/supabase-js');
          const fs = require('fs');

          const log = (msg) => console.log(`[${new Date().toISOString()}] ${msg}`);

          async function downloadFromFTP() {
            const client = new ftp.Client(30000);
            client.ftp.verbose = false;
            try {
              log('📡 Connecting to L-shop FTP...');
              await client.access({
                host:     process.env.LSHOP_FTP_HOST,
                user:     process.env.LSHOP_FTP_USER,
                password: process.env.LSHOP_FTP_PASS,
                port:     parseInt(process.env.LSHOP_FTP_PORT || '21'),
                secure:   false
              });
              log('✅ Connected. Listing files...');

              const files = await client.list();
              log(`Found ${files.length} files: ${files.map(f => f.name).join(', ')}`);

              log('📥 Downloading stockfile.csv...');
              await client.downloadTo('stockfile.csv', 'stockfile.csv');

              const stats = fs.statSync('stockfile.csv');
              log(`✅ Downloaded ${(stats.size / 1024 / 1024).toFixed(2)} MB`);
            } finally {
              client.close();
            }
          }

          function parseCSV(filepath) {
            // Læs filen som UTF-8 og strip BOM eksplicit
            let content = fs.readFileSync(filepath, 'utf8');
            if (content.charCodeAt(0) === 0xFEFF) {
              content = content.slice(1);
              log('🔧 Stripped UTF-8 BOM from CSV');
            }

            // Split på linjer (håndter både \r\n og \n)
            const lines = content.split(/\r?\n/).filter(l => l.trim().length > 0);
            if (lines.length < 2) throw new Error('CSV is empty or has only header');

            // Header: article;stock;catalog
            const headers = lines[0].split(';').map(h => h.trim().toLowerCase());
            log(`📋 CSV headers: ${headers.join(', ')}`);

            const idxArticle = headers.indexOf('article');
            const idxStock   = headers.indexOf('stock');
            const idxCatalog = headers.indexOf('catalog');

            if (idxArticle < 0 || idxStock < 0 || idxCatalog < 0) {
              throw new Error(`Missing expected columns. Found: ${headers.join(', ')}`);
            }

            const rows = [];
            const now = new Date().toISOString();
            let dropped = 0;

            for (let i = 1; i < lines.length; i++) {
              const vals = lines[i].split(';');
              const article = (vals[idxArticle] || '').trim();
              const stock   = parseInt((vals[idxStock] || '0').trim(), 10);
              const catalog = (vals[idxCatalog] || '').trim();

              if (!article || !catalog || isNaN(stock)) {
                dropped++;
                continue;
              }

              rows.push({
                article_number: article,
                catalog_nr:     catalog,
                stock_qty:      stock,
                last_updated:   now
              });
            }

            log(`✅ Parsed ${rows.length} valid rows (${dropped} dropped)`);
            return rows;
          }

          async function uploadToSupabase(rows) {
            const supabase = createClient(
              process.env.SUPABASE_URL,
              process.env.SUPABASE_KEY
            );

            // Truncate via DELETE (RLS skal tillade det — eller brug service_role)
            log('🗑️  Clearing old stock data...');
            const { error: delErr } = await supabase
              .from('lshop_stock')
              .delete()
              .neq('article_number', '___never_match___');
            if (delErr) {
              log(`⚠️  Delete error: ${delErr.message}`);
            }

            // Batch insert (1000 ad gangen — Supabase limit)
            const batchSize = 1000;
            let inserted = 0;

            for (let i = 0; i < rows.length; i += batchSize) {
              const batch = rows.slice(i, i + batchSize);
              const { error } = await supabase
                .from('lshop_stock')
                .upsert(batch, { onConflict: 'article_number' });

              if (error) {
                log(`❌ Batch ${i}-${i + batch.length} failed: ${error.message}`);
                throw error;
              }
              inserted += batch.length;
              if (i % 10000 === 0) {
                log(`   ${inserted}/${rows.length} (${Math.round(inserted/rows.length*100)}%)`);
              }
            }

            log(`🎉 Uploaded ${inserted} rows to lshop_stock`);
            return inserted;
          }

          (async () => {
            try {
              log('🚀 Starting L-shop stock sync');
              await downloadFromFTP();
              const rows = parseCSV('stockfile.csv');
              const count = await uploadToSupabase(rows);
              log(`✨ DONE — ${count} rows synced`);
            } catch (err) {
              console.error(`💥 SYNC FAILED: ${err.message}`);
              console.error(err.stack);
              process.exit(1);
            }
          })();
          SCRIPT_EOF

          node sync-stock.js
